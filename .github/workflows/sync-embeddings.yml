name: Sync Post Embeddings

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run sync
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: node scripts/sync-embeddings.mjs
